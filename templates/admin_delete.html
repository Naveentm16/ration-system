<!DOCTYPE html>
<html>
<head>
<title>Delete Entry</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div class="container mt-4">

<h3>Delete Entry</h3>

<form method="POST">
<input name="tid" class="form-control mb-2" placeholder="Transaction ID">
<button class="btn btn-primary">Search</button>
</form>

{% if entry %}
<div class="card mt-3 p-3">
<p><b>Name:</b> {{entry['name']}}</p>
<p><b>Item:</b> {{entry['ration']}}</p>
<p><b>Amount:</b> {{entry['amount']}}</p>
<p><b>Date:</b> {{entry['datetime']}}</p>

<a href="/confirm_delete/{{entry['transaction_id']}}" class="btn btn-danger">
Confirm Delete
</a>
</div>
{% endif %}

</div>
</body>
</html>
