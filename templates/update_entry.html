<!DOCTYPE html>
<html>
<head>
    <title>Update Entry</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card p-4 shadow-sm mx-auto" style="max-width: 500px;">
        <h2 class="mb-4 text-center">Update Entry {{ entry.transaction_id }}</h2>
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Ration</label>
                <input type="text" name="ration" class="form-control" value="{{ entry.ration }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Amount</label>
                <input type="number" name="amount" step="0.01" class="form-control" value="{{ entry.amount }}" required>
            </div>
            <button type="submit" class="btn btn-success w-100">Update</button>
        </form>
    </div>
</div>
</body>
</html>
