<!DOCTYPE html>
<html>
<head>
    <title>Update Entry</title>
</head>
<body>
    <h2>Update Entry {{ entry.transaction_id }}</h2>
    <form method="POST">
        <label>Ration:</label>
        <input type="text" name="ration" value="{{ entry.ration }}" required><br><br>
        <label>Amount:</label>
        <input type="number" name="amount" value="{{ entry.amount }}" step="0.01" required><br><br>
        <button type="submit">Update</button>
    </form>
</body>
</html>
