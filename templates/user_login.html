<!DOCTYPE html>
<html>
<head>
<title>User Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white d-flex justify-content-center align-items-center vh-100">

<form method="POST" class="bg-secondary p-4 rounded shadow">
<h3 class="mb-3 text-center">User Login</h3>

<input name="id" class="form-control mb-2" placeholder="User ID" required>
<input name="password" type="password" class="form-control mb-3" placeholder="Password" required>

<button class="btn btn-warning w-100">Login</button>
</form>

</body>
</html>
