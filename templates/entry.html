<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

<div class="d-flex justify-content-between">
<h3>Welcome {{ user_name }}</h3>
<a href="/user_logout" class="btn btn-danger">Logout</a>
</div>

<form method="POST" action="/submit" class="mt-3">
<input type="hidden" name="name" value="{{ user_name }}">

<div id="rows">
<div class="row mb-2">
<div class="col"><input name="ration[]" class="form-control" placeholder="Item"></div>
<div class="col"><input name="amount[]" class="form-control" placeholder="Amount"></div>
</div>
</div>

<button type="button" class="btn btn-secondary" onclick="addRow()">Add More</button>
<button class="btn btn-success">Submit</button>
</form>

<h4 class="mt-4">Your Entries</h4>
<table class="table table-bordered">
<tr><th>ID</th><th>Item</th><th>Amount</th><th>Status</th></tr>

{% for e in entries %}
<tr>
<td>{{e['transaction_id']}}</td>
<td>{{e['ration']}}</td>
<td>{{e['amount']}}</td>
<td>
{% if e['calculated']==1 %}
<span class="badge bg-success">Done</span>
{% else %}
<span class="badge bg-warning">Pending</span>
{% endif %}
</td>
</tr>
{% endfor %}
</table>

<a href="/user_settlement/{{ latest_id }}" class="btn btn-info">View Settlement</a>

</div>

<script>
function addRow(){
let div=document.createElement("div");
div.className="row mb-2";
div.innerHTML=`<div class="col"><input name="ration[]" class="form-control"></div>
<div class="col"><input name="amount[]" class="form-control"></div>`;
document.getElementById("rows").appendChild(div);
}
</script>

</body>
</html>
