<!DOCTYPE html>
<html>
<head>
    <title>User Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="bg-light">
<div class="container mt-4">
    <h2>Welcome, {{ user_name }}</h2>

    <div class="card mt-3 p-3 shadow-sm">
        <h4>Add Entry</h4>
        <form method="POST" action="/submit">
            <div class="mb-3">
                <label class="form-label">Ration</label>
                <input type="text" name="ration" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Amount</label>
                <input type="number" name="amount" step="0.01" class="form-control" required>
            </div>
            <input type="hidden" name="name" value="{{ user_name }}">
            <button type="submit" class="btn btn-success">Submit</button>
        </form>
    </div>

    <div class="card mt-4 p-3 shadow-sm">
        <h4>Your Entries</h4>
        <table class="table table-striped table-bordered mt-2">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Ration</th>
                    <th>Amount</th>
                    <th>Date</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for entry in entries %}
                <tr>
                    <td>{{ entry.transaction_id }}</td>
                    <td>{{ entry.ration }}</td>
                    <td>{{ entry.amount }}</td>
                    <td>{{ entry.datetime }}</td>
                    <td><a href="/update/{{ entry.transaction_id }}" class="btn btn-sm btn-primary">Update</a></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
