<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script>
function fetchName(){
let id=document.getElementById("id").value;
fetch("/get_user/"+id)
.then(res=>res.json())
.then(data=>{
document.getElementById("name").value=data.name;
});
}
</script>
</head>
<body class="container mt-4">
<div class="card p-4 shadow rounded-4">
<h3 class="text-center">Ration Entry</h3>
<form method="post" action="/submit">
<input class="form-control mb-3" id="id" name="id" placeholder="Enter ID" onkeyup="fetchName()">
<input class="form-control mb-3" id="name" name="name" readonly>
<input class="form-control mb-3" name="ration" placeholder="Ration Name">
<input class="form-control mb-3" name="amount" placeholder="Amount">
<button class="btn btn-success w-100">Submit</button>
</form>
</div>
</body>
</html>
