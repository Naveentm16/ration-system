<!DOCTYPE html>
<html>
<head>
<title>User Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

<h3>Welcome, {{user_name}}</h3>

<form method="POST" action="/submit">
<input type="hidden" name="name" value="{{user_name}}">

<div id="rows">
<div class="row mb-2">
<div class="col"><input name="ration[]" class="form-control" placeholder="Item"></div>
<div class="col"><input name="amount[]" class="form-control" placeholder="Amount"></div>
</div>
</div>

<button type="button" onclick="addRow()" class="btn btn-secondary mb-2">+ Add Row</button>
<br>
<button class="btn btn-primary">Submit</button>
</form>

<hr>

<h5>Your Entries</h5>
<table class="table table-bordered">
<tr><th>Item</th><th>Amount</th><th>Status</th></tr>

{% for e in entries %}
<tr>
<td>{{e['ration']}}</td>
<td>{{e['amount']}}</td>
<td>
{% if e['calculated']==1 %}
<span class="badge bg-success">Locked</span>
{% else %}
<span class="badge bg-warning">Editable</span>
{% endif %}
</td>
</tr>
{% endfor %}
</table>

{% if latest_id %}
<a href="/user_settlement/{{latest_id}}" class="btn btn-info">
View Settlement
</a>
{% endif %}

</div>

<script>
function addRow(){
    let html = `
    <div class="row mb-2">
        <div class="col"><input name="ration[]" class="form-control" placeholder="Item"></div>
        <div class="col"><input name="amount[]" class="form-control" placeholder="Amount"></div>
    </div>`;
    document.getElementById("rows").insertAdjacentHTML('beforeend', html);
}
</script>

</body>
</html>
