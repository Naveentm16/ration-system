<!DOCTYPE html>
<html>
<head>
    <title>User Dashboard</title>
</head>
<body>
    <h2>Welcome, {{ session['user'] }}</h2>

    <h3>Add Entry</h3>
    <form method="POST" action="/submit">
        <input type="hidden" name="name" value="{{ session['user'] }}">
        <label>Ration:</label>
        <input type="text" name="ration" required><br><br>
        <label>Amount:</label>
        <input type="number" name="amount" step="0.01" required><br><br>
        <button type="submit">Submit</button>
    </form>

    <h3>Your Entries</h3>
    <table border="1">
        <tr>
            <th>ID</th>
            <th>Ration</th>
            <th>Amount</th>
            <th>Date</th>
            <th>Action</th>
        </tr>
        {% for entry in entries %}
        <tr>
            <td>{{ entry.transaction_id }}</td>
            <td>{{ entry.ration }}</td>
            <td>{{ entry.amount }}</td>
            <td>{{ entry.datetime }}</td>
            <td><a href="/update/{{ entry.transaction_id }}">Update</a></td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
