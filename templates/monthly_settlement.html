<!DOCTYPE html>
<html>
<head>
    <title>Monthly Settlement - {{ month }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="bg-light">
<div class="container mt-4">
    <h2>Monthly Settlement for {{ month }}</h2>
    <p>Total Amount: {{ total }}</p>
    <p>Per Person Share: {{ per_person }}</p>

    <table class="table table-striped table-bordered mt-2">
        <thead class="table-dark">
            <tr>
                <th>User ID</th>
                <th>Name</th>
                <th>Paid</th>
                <th>Balance</th>
            </tr>
        </thead>
        <tbody>
            {% for row in df %}
            <tr>
                <td>{{ row.id }}</td>
                <td>{{ row.name }}</td>
                <td>{{ row.paid }}</td>
                <td>{{ row.balance }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <a href="/settle_month/{{ month }}" class="btn btn-success mt-3">Mark Month Settled</a>
</div>
</body>
</html>
