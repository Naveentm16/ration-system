<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Monthly Settlement</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-4">
    <h3>Settlement for {{ month }}</h3>
    <p>Total Amount: {{ "%.2f"|format(total) }} | Per Person: {{ "%.2f"|format(per_person) }}</p>
    <table class="table table-bordered">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Total Paid</th>
                <th>Balance</th>
            </tr>
        </thead>
        <tbody>
            {% for row in df %}
            <tr>
                <td>{{ row['id'] }}</td>
                <td>{{ row['name'] }}</td>
                <td>{{ "%.2f"|format(row['amount']) }}</td>
                <td>{{ "%.2f"|format(row['balance']) }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <a href="/admin" class="btn btn-secondary">Back to Admin</a>
</div>
</body>
</html>
