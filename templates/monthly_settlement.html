<!DOCTYPE html>
<html>
<head>
<title>Monthly Settlement</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div class="container mt-4">

<h3>Settlement {{month}}</h3>

<table class="table table-bordered">
<tr><th>Name</th><th>Paid</th><th>Balance</th></tr>

{% for row in df %}
<tr>
<td>{{row['name']}}</td>
<td>{{row['amount']}}</td>
<td>{{row['balance']}}</td>
</tr>
{% endfor %}

</table>

<h4>Final Settlement</h4>

<table class="table table-bordered">
<tr><th>Payer</th><th>Receiver</th><th>Amount</th></tr>

{% for s in settlements %}
<tr>
<td>{{s.from}}</td>
<td>{{s.to}}</td>
<td>{{s.amount}}</td>
</tr>
{% endfor %}

</table>

</div>
</body>
</html>
