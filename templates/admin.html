<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
<h2>Admin Dashboard</h2>
<a href="/report" class="btn btn-info mb-3">View Report</a>
<table class="table table-bordered">
<tr>
<th>Transaction ID</th><th>ID</th><th>Name</th><th>Ration</th><th>Amount</th><th>Date</th><th>Action</th>
</tr>
{% for row in data %}
<tr>
<td>{{row[0]}}</td>
<td>{{row[1]}}</td>
<td>{{row[2]}}</td>
<td>{{row[3]}}</td>
<td>{{row[4]}}</td>
<td>{{row[5]}}</td>
<td><a class="btn btn-danger btn-sm" href="/delete/{{row[0]}}">Delete</a></td>
</tr>
{% endfor %}
</table>
</body>
</html>
