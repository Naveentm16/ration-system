<!DOCTYPE html>
<html>
<head>
<title>User Settlement</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div class="container mt-4">

<h3>{{name}} - Settlement {{sid}}</h3>

<h4 class="text-danger">You Pay</h4>
{% for p in pay %}
<p>{{p['receiver']}} → {{p['amount']}}
<a href="/mark_paid/{{p['id']}}" class="btn btn-sm btn-danger">Paid</a>
</p>
{% endfor %}

<h4 class="text-success mt-3">You Receive</h4>
{% for r in receive %}
<p>{{r['payer']}} → {{r['amount']}}
<a href="/mark_received/{{r['id']}}" class="btn btn-sm btn-success">Received</a>
</p>
{% endfor %}

</div>
</body>
</html>
