<!DOCTYPE html>
<html>
<head>
<title>Your Settlement</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div class="container mt-4">

<h3>Your Settlement</h3>

<table class="table table-bordered">
<tr><th>Pay To</th><th>Amount</th></tr>

{% for p in pay %}
<tr>
<td>{{p['receiver']}}</td>
<td>{{p['amount']}}</td>
</tr>
{% endfor %}
</table>

<table class="table table-bordered">
<tr><th>Receive From</th><th>Amount</th></tr>

{% for r in receive %}
<tr>
<td>{{r['payer']}}</td>
<td>{{r['amount']}}</td>
</tr>
{% endfor %}
</table>

</div>
</body>
</html>
